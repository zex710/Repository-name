<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لهجات | مولّد المحتوى العربي</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#131110">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="لهجات">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #131110;
    --bg-raised: #1c1917;
    --ink: #ece4d3;
    --ink-dim: #a89c86;
    --gold: #c9a227;
    --gold-dim: #8a7220;
    --teal: #3a6b62;
    --line: #35302a;
    --error: #b5533c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    padding:0 0 60px;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 20px;}

  header{
    padding:48px 20px 32px;
    text-align:center;
    position:relative;
    border-bottom:1px solid var(--line);
    margin-bottom:36px;
  }
  header .eyebrow{
    font-size:13px;
    letter-spacing:2px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  header h1{
    font-family:'Aref Ruqaa',serif;
    font-weight:700;
    font-size:44px;
    margin:0 0 12px;
    color:var(--ink);
  }
  header p{
    color:var(--ink-dim);
    font-size:15px;
    max-width:420px;
    margin:0 auto;
  }
  .divider{
    width:80px;height:1px;background:var(--gold-dim);
    margin:20px auto 0;
    position:relative;
  }
  .divider::after{
    content:'✦';
    position:absolute;
    top:-9px;right:50%;
    transform:translateX(50%);
    color:var(--gold);
    font-size:14px;
    background:var(--bg);
    padding:0 8px;
  }

  label.field-label{
    display:block;
    font-size:14px;
    color:var(--ink-dim);
    margin-bottom:8px;
  }
  textarea{
    width:100%;
    background:var(--bg-raised);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    font-size:16px;
    padding:14px 16px;
    resize:vertical;
    min-height:110px;
    line-height:1.7;
  }
  textarea:focus{outline:2px solid var(--gold-dim);border-color:transparent;}

  .section{margin-bottom:28px;}

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
  }
  .chip{
    border:1px solid var(--line);
    background:var(--bg-raised);
    color:var(--ink-dim);
    padding:9px 18px;
    border-radius:999px;
    font-size:14px;
    cursor:pointer;
    transition:all .15s ease;
    user-select:none;
  }
  .chip.active{
    border-color:var(--gold-dim);
    color:var(--gold);
    background:rgba(201,162,39,0.08);
  }
  .chip:focus-visible{outline:2px solid var(--gold);}

  .tone-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}

  button.generate{
    width:100%;
    background:var(--gold);
    color:#161310;
    border:none;
    padding:16px;
    font-size:16px;
    font-weight:700;
    border-radius:10px;
    cursor:pointer;
    font-family:'Tajawal',sans-serif;
    transition:background .15s ease, transform .1s ease;
  }
  button.generate:hover{background:#dbb636;}
  button.generate:active{transform:scale(0.99);}
  button.generate:disabled{background:var(--gold-dim);cursor:not-allowed;}

  .results{margin-top:36px;display:flex;flex-direction:column;gap:16px;}
  .card{
    background:var(--bg-raised);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px 20px 16px;
    position:relative;
    animation:rise .35s ease both;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
  }
  .card .dialect-tag{
    color:var(--gold);
    font-size:13px;
    font-weight:700;
    letter-spacing:.5px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .card p{
    font-size:16px;
    line-height:2;
    margin:0 0 12px;
    white-space:pre-wrap;
  }
  .copy-btn{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:13px;
    padding:6px 14px;
    border-radius:8px;
    cursor:pointer;
    font-family:'Tajawal',sans-serif;
  }
  .copy-btn:hover{color:var(--gold);border-color:var(--gold-dim);}
  .copy-btn.copied{color:var(--teal);border-color:var(--teal);}

  .status{
    text-align:center;
    color:var(--ink-dim);
    font-size:14px;
    margin-top:18px;
    min-height:20px;
  }
  .status.error{color:var(--error);}

  .spinner{
    display:inline-block;
    width:14px;height:14px;
    border:2px solid var(--gold-dim);
    border-top-color:var(--gold);
    border-radius:50%;
    animation:spin .7s linear infinite;
    vertical-align:middle;
    margin-left:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  footer{
    text-align:center;
    color:var(--ink-dim);
    font-size:12px;
    margin-top:50px;
    opacity:.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">ZEX LABS</div>
    <h1>لهجات</h1>
    <p>اكتب فكرتك مرة واحدة، وخلّيها توصل لكل بلد بصوتها</p>
    <div class="divider"></div>
  </header>

  <div class="section">
    <label class="field-label" for="topic">النص أو الفكرة</label>
    <textarea id="topic" placeholder="مثلاً: إعلان عن عرض خصم ٢٠٪ على المنتجات الجديدة لمدة أسبوع بس"></textarea>
  </div>

  <div class="section">
    <label class="field-label">اللهجات</label>
    <div class="chips" id="dialects">
      <div class="chip active" data-value="فصحى">فصحى</div>
      <div class="chip active" data-value="مصري">مصري</div>
      <div class="chip active" data-value="خليجي">خليجي</div>
      <div class="chip" data-value="شامي">شامي</div>
      <div class="chip" data-value="مغربي">مغربي</div>
    </div>
  </div>

  <div class="section">
    <label class="field-label">الأسلوب</label>
    <div class="chips" id="tones">
      <div class="chip active" data-value="تسويقي">تسويقي</div>
      <div class="chip" data-value="رسمي">رسمي</div>
      <div class="chip" data-value="كوميدي">كوميدي</div>
      <div class="chip" data-value="عاطفي">عاطفي</div>
    </div>
  </div>

  <button class="generate" id="genBtn">ولّد المحتوى</button>
  <div class="status" id="status"></div>

  <div class="results" id="results"></div>

  <footer>مصنوع بأيدي ZEX</footer>
</div>

<script>
const dialectsEl = document.getElementById('dialects');
const tonesEl = document.getElementById('tones');
const genBtn = document.getElementById('genBtn');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const topicEl = document.getElementById('topic');

function setupChips(container, multi = true) {
  container.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('active');
    });
  });
}
setupChips(dialectsEl);
setupChips(tonesEl);

function getActive(container) {
  return Array.from(container.querySelectorAll('.chip.active')).map(c => c.dataset.value);
}

async function generate() {
  const topic = topicEl.value.trim();
  const dialects = getActive(dialectsEl);
  const tones = getActive(tonesEl);

  if (!topic) {
    statusEl.textContent = 'اكتب الفكرة الأول';
    statusEl.className = 'status error';
    return;
  }
  if (dialects.length === 0) {
    statusEl.textContent = 'اختار لهجة واحدة على الأقل';
    statusEl.className = 'status error';
    return;
  }

  genBtn.disabled = true;
  resultsEl.innerHTML = '';
  statusEl.className = 'status';
  statusEl.innerHTML = 'بيتولد دلوقتي<span class="spinner"></span>';

  const toneStr = tones.length ? tones.join(' و ') : 'طبيعي';

  const systemPrompt = `أنت كاتب محتوى عربي محترف متخصص في اللهجات المختلفة.
مهمتك: تاخد نص أو فكرة، وتعيد كتابتها بلهجات متعددة يطلبها المستخدم، بأسلوب: ${toneStr}.
كل نسخة لازم تحافظ على المعنى الأساسي بس بصوت ولهجة مختلفة فعلاً (مش مجرد ترجمة كلمة كلمة).
رد فقط بصيغة JSON صحيحة بدون أي نص إضافي أو Markdown، بالشكل ده بالظبط:
{"versions": [{"dialect": "اسم اللهجة", "text": "المحتوى المولد"}]}`;

  const userPrompt = `الفكرة: ${topic}\n\nاللهجات المطلوبة: ${dialects.join('، ')}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }]
      })
    });

    if (!response.ok) throw new Error('فشل الاتصال بالسيرفر');

    const data = await response.json();
    const rawText = data.content.map(b => b.text || '').join('').trim();
    const cleaned = rawText.replace(/^```json/i, '').replace(/```$/,'').trim();
    const parsed = JSON.parse(cleaned);

    if (!parsed.versions || !Array.isArray(parsed.versions)) {
      throw new Error('صيغة الرد غير متوقعة');
    }

    statusEl.textContent = '';
    parsed.versions.forEach(v => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="dialect-tag">
          <span>${v.dialect}</span>
          <button class="copy-btn">نسخ</button>
        </div>
        <p>${v.text}</p>
      `;
      const copyBtn = card.querySelector('.copy-btn');
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(v.text);
          copyBtn.textContent = 'اتنسخ ✓';
          copyBtn.classList.add('copied');
          setTimeout(() => {
            copyBtn.textContent = 'نسخ';
            copyBtn.classList.remove('copied');
          }, 1500);
        } catch (e) {
          copyBtn.textContent = 'مقدرتش أنسخ';
        }
      });
      resultsEl.appendChild(card);
    });
  } catch (err) {
    statusEl.textContent = 'حصل خطأ: ' + err.message + ' — جرب تاني';
    statusEl.className = 'status error';
  } finally {
    genBtn.disabled = false;
  }
}

genBtn.addEventListener('click', generate);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
